<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />
<title>OCEO 2.0 — Global Search</title>
<style>
:root{
  --s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;
  --t-xs:11px;--t-sm:13px;--t-base:14px;--t-md:16px;--t-lg:20px;--t-xl:28px;
  --font-ui:"Inter Tight",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  --font-display:"Spectral",Georgia,serif;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-pill:999px;
  --canvas:#F5F6F4;--surface:#FFFFFF;--surface-2:#FAFBFA;--surface-3:#F0F2EF;
  --line:#E4E7E3;--line-2:#EDEFEB;--ink:#19211E;--ink-2:#566059;--ink-3:#8A938C;--charcoal:#24262B;
  --brand:#C41F3E;--brand-600:#A81733;--brand-700:#7E0F26;--brand-tint:#FBEEF0;--brand-tint-2:#F2D5DA;
  --success:#2E7D5B;--warning:#A86A12;--danger:#B23A2C;--info:#2B6CB0;--info-tint:#E2ECF7;
  --sh-xs:0 1px 2px rgba(16,24,20,.06);--sh-lg:0 30px 80px rgba(16,24,20,.30);
  --sidebar-w:248px;--topbar-h:60px;--ring:0 0 0 3px rgba(196,31,62,.20);
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-ui);font-size:var(--t-base);color:var(--ink);background:var(--canvas);-webkit-font-smoothing:antialiased;}
svg{display:block;}button{font-family:inherit;cursor:pointer;}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}
.sidebar{background:var(--charcoal);color:#D7DADE;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.brand{display:flex;align-items:center;gap:var(--s3);padding:var(--s5) var(--s5) var(--s4);}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,var(--brand),var(--brand-700));display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;}
.brand-name{font-family:var(--font-display);font-size:var(--t-md);color:#fff;line-height:1.1;}
.brand-sub{font-size:var(--t-xs);color:#9A9FA6;letter-spacing:.08em;text-transform:uppercase;}
.nav{padding:var(--s3);display:flex;flex-direction:column;gap:2px;flex:1 1 auto;}
.nav-label{font-size:var(--t-xs);letter-spacing:.1em;text-transform:uppercase;color:#868B92;padding:var(--s4) var(--s3) var(--s2);}
.nav-item{display:flex;align-items:center;gap:var(--s3);padding:9px var(--s3);border-radius:var(--r-sm);color:#C7CACE;font-size:var(--t-base);font-weight:500;border:none;background:transparent;width:100%;text-align:left;}
.nav-item svg{width:18px;height:18px;opacity:.85;}
.nav-item.active{background:var(--brand-600);color:#fff;}
.main{display:flex;flex-direction:column;min-width:0;}
.topbar{height:var(--topbar-h);display:flex;align-items:center;gap:var(--s4);padding:0 var(--s6);background:var(--surface);border-bottom:1px solid var(--line);}
.crumbs{font-size:var(--t-sm);color:var(--ink-3);}
.fauxsearch{margin-left:auto;width:320px;height:38px;border:1px solid var(--line);background:var(--surface-2);border-radius:var(--r-pill);display:flex;align-items:center;gap:8px;padding:0 14px;color:var(--ink-3);font-size:var(--t-sm);cursor:text;}
.fauxsearch svg{width:16px;height:16px;}
.fauxsearch kbd{margin-left:auto;font-size:10px;border:1px solid var(--line);border-radius:5px;padding:1px 5px;background:var(--surface);}
.content{padding:var(--s6);color:var(--ink-3);}
.content .ph{height:14px;background:var(--surface-3);border-radius:6px;margin-bottom:12px;}

/* command palette */
.scrim{position:fixed;inset:0;background:rgba(20,16,18,.45);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding-top:11vh;z-index:100;}
.palette{width:640px;max-width:92vw;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-lg);overflow:hidden;display:flex;flex-direction:column;max-height:74vh;}
.p-search{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line);}
.p-search > svg{width:20px;height:20px;color:var(--ink-3);flex:0 0 auto;}
.p-search input{flex:1 1 auto;border:none;outline:none;font-size:var(--t-lg);font-family:inherit;color:var(--ink);background:transparent;}
.p-search input::placeholder{color:var(--ink-3);}
.p-search .esc{font-size:10px;color:var(--ink-3);border:1px solid var(--line);border-radius:5px;padding:2px 7px;}
.p-scope{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--line-2);overflow-x:auto;}
.p-scope button{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;line-height:1;min-height:28px;white-space:nowrap;font-family:var(--font-ui);font-size:var(--t-xs);font-weight:600;letter-spacing:.01em;color:var(--ink-2);background:var(--surface-3);border:none;border-radius:var(--r-pill);padding:0 14px;}
.p-scope button.on{background:var(--brand);color:#fff;}
.p-body{flex:1 1 auto;overflow-y:auto;padding:8px 0 10px;}
.grp-h{font-size:var(--t-xs);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;padding:12px 20px 6px;display:flex;align-items:center;gap:8px;}
.grp-h .c{color:var(--ink-3);font-weight:600;}
.res{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;border-left:2px solid transparent;}
.res:hover,.res.active{background:var(--brand-tint);}
.res .ic{width:34px;height:34px;border-radius:8px;background:var(--surface-3);color:var(--ink-2);display:grid;place-items:center;flex:0 0 auto;}
.res .ic svg{width:17px;height:17px;}
.res .ic.client{background:var(--brand-tint);color:var(--brand);}
.res .tx{flex:1 1 auto;min-width:0;}
.res .tx .n{font-size:var(--t-sm);font-weight:600;color:var(--ink);}
.res .tx .n mark{background:rgba(196,31,62,.16);color:var(--brand-700);border-radius:3px;padding:0 1px;}
.res .tx .s{font-size:var(--t-xs);color:var(--ink-3);margin-top:1px;display:flex;align-items:center;gap:5px;}
.res .tx .s svg{width:12px;height:12px;color:var(--ink-3);flex:0 0 auto;}
.res .tx .s mark{background:transparent;color:var(--brand-700);font-weight:600;}
.res .pc{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand-700);background:var(--brand-tint);border-radius:var(--r-pill);padding:2px 8px;}
.res .go{flex:0 0 auto;color:var(--ink-3);font-size:var(--t-xs);}
.res.active .go{color:var(--brand);}

/* empty / no-results */
.recent .grp-h{padding-top:16px;}
.noresults{text-align:center;padding:52px 24px;}
.noresults .ic{width:54px;height:54px;border-radius:50%;background:var(--surface-3);display:grid;place-items:center;margin:0 auto 16px;color:var(--ink-3);}
.noresults .ic svg{width:24px;height:24px;}
.noresults .t{font-size:var(--t-md);font-weight:700;color:var(--ink-2);}
.noresults .t b{color:var(--ink);}
.noresults .d{font-size:var(--t-sm);color:var(--ink-3);margin-top:6px;}

.p-foot{display:flex;align-items:center;gap:16px;padding:10px 18px;border-top:1px solid var(--line);background:var(--surface-2);font-size:var(--t-xs);color:var(--ink-3);}
.p-foot .k{display:inline-flex;align-items:center;gap:5px;}
.p-foot kbd{font-size:10px;border:1px solid var(--line);border-radius:5px;padding:1px 6px;background:var(--surface);min-width:18px;text-align:center;}
.p-foot .right{margin-left:auto;display:inline-flex;align-items:center;gap:6px;}
.p-foot .right svg{width:13px;height:13px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,20px);background:var(--charcoal);color:#fff;padding:12px 18px;border-radius:var(--r-sm);font-size:var(--t-sm);box-shadow:var(--sh-lg);z-index:200;opacity:0;pointer-events:none;transition:all .3s;display:flex;gap:8px;align-items:center;}
.toast.show{opacity:1;transform:translate(-50%,0);}
.toast svg{width:16px;height:16px;color:#6BD3A6;}

/* icon centering safety-net */
.stat .ic,.kpi .ic,.att .ic,.res .ic,.lr .ic,.card .ic,.mini-icon{line-height:0;}
.stat .ic>svg,.kpi .ic>svg,.att .ic>svg,.res .ic>svg,.lr .ic>svg,.card .ic>svg,.mini-icon>svg{display:block;}

/* === presentation: VC-only + robust icon centering === */
.role-seg{display:none !important;}
.modepill{display:none !important;}
.stat .ic,.kpi .ic,.att .ic,.res .ic,.lr .ic,.card .ic,.mini-icon,.qa button .ic{display:flex !important;align-items:center !important;justify-content:center !important;}
.stat .ic>svg,.kpi .ic>svg,.att .ic>svg,.res .ic>svg,.lr .ic>svg,.card .ic>svg,.mini-icon>svg,.qa button .ic>svg{display:block;flex:0 0 auto;}

/* remove single-colour left borders/accents */
.kpi::after{display:none !important;}
.kpi.feature::before{display:none !important;}
#s-glance .gstat:first-child::before,.gstat:first-child::before{display:none !important;}
.sec-h h2::before{display:none !important;}
.sec-h h2{padding-left:0 !important;}
.note .bar{display:none !important;}
.note{gap:0 !important;}

/* bulletproof icon centering */
.stat .ic>svg,.kpi .ic>svg,.att .ic>svg,.res .ic>svg,.lr .ic>svg,.card .ic>svg,.mini-icon>svg,.qa button .ic>svg{margin:auto !important;}

/* absolute icon centering (failsafe) */
.stat .ic,.kpi .ic,.att .ic,.res .ic,.lr .ic,.card .ic,.mini-icon,.qa button .ic{position:relative !important;overflow:hidden;}
.stat .ic>svg,.kpi .ic>svg,.att .ic>svg,.res .ic>svg,.lr .ic>svg,.card .ic>svg,.mini-icon>svg,.qa button .ic>svg{position:absolute !important;top:50% !important;left:50% !important;transform:translate(-50%,-50%) !important;margin:0 !important;}

/* uniform icon-well sizing (consistency) */
.kpi .ic,.att .ic,.stat .ic,.res .ic,.lr .ic{width:40px !important;height:40px !important;min-width:40px !important;min-height:40px !important;flex:0 0 40px !important;border-radius:10px !important;padding:0 !important;margin:0 !important;box-sizing:border-box !important;}
.kpi .ic>svg,.att .ic>svg,.stat .ic>svg,.res .ic>svg,.lr .ic>svg{width:20px !important;height:20px !important;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">O</div><div><div class="brand-name">OCEO&nbsp;2.0</div><div class="brand-sub">Office of the CEO</div></div></div>
    <nav class="nav">
      <div class="nav-label">Workspace</div>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>My Portfolio</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Clients</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>Notes &amp; Tasks</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 17l5-5 4 4 8-9"/><path d="M21 7v5h-5"/></svg>Pipeline</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>Dashboard</button>
      <div class="nav-label">Tools</div>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>Ask CAI</button>
      <button class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>Global Search</button>
    </nav>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="crumbs">Global Search</div>
      <div class="fauxsearch" id="reopen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>Search everything…</div>
    </header>
    <div class="content"><div class="ph" style="width:30%"></div><div class="ph" style="width:70%"></div><div class="ph" style="width:55%"></div><div class="ph" style="width:62%"></div></div>
  </div>
</div>

<div class="scrim" id="scrim">
  <div class="palette" role="dialog" aria-label="Global search">
    <div class="p-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.34-4.34"/></svg>
      <input id="q" placeholder="Search clients, people, deals, notes…" value="north" autocomplete="off" />
      <span class="esc">ESC</span>
    </div>
    <div class="p-scope" id="scope">
      <button class="on" data-scope="all">All</button>
      <button data-scope="Client">Clients</button>
      <button data-scope="Person">People</button>
      <button data-scope="Deal">Deals</button>
      <button data-scope="Note">Notes</button>
    </div>
    <div class="p-body" id="body"></div>
    <div class="p-foot">
      <span class="k"><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span class="k"><kbd>↵</kbd> open</span>
      <span class="k"><kbd>esc</kbd> close</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg><span id="toastMsg"></span></div>

<script>
var ICON={
 Client:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 18v-7" /> <path d="M11.119 2.205a2 2 0 0 1 1.762 0l7.84 3.846A.5.5 0 0 1 20.5 7h-17a.5.5 0 0 1-.22-.949z" /> <path d="M14 18v-7" /> <path d="M18 18v-7" /> <path d="M3 22h18" /> <path d="M6 18v-7" /></svg>',
 Person:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /> <circle cx="12" cy="7" r="4" /></svg>',
 Deal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 7h6v6" /> <path d="m22 7-8.5 8.5-5-5L2 17" /></svg>',
 Note:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z" /> <path d="M14 2v5a1 1 0 0 0 1 1h5" /> <path d="M10 9H8" /> <path d="M16 13H8" /> <path d="M16 17H8" /></svg>'
};
var DRILL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 10 5 5-5 5" /> <path d="M4 4v7a4 4 0 0 0 4 4h12" /></svg>';

var DATA=[
 {type:'Client',name:'Northwind Holdings',sub:'Diversified Holdings · SCR 2026 · your coverage',href:'oceo-c360-prototype.html'},
 {type:'Client',name:'Northwind Renewables Corp',sub:'Subsidiary',parent:'Northwind Holdings'},
 {type:'Client',name:'Northwind Logistics LP',sub:'Subsidiary',parent:'Northwind Holdings'},
 {type:'Client',name:'Atlas Infrastructure',sub:'Indirect subsidiary',parent:'Northwind Holdings'},
 {type:'Client',name:'Wind Project Co.',sub:'Portfolio company',parent:'Northwind Renewables Corp'},
 {type:'Client',name:'Midland Energy',sub:'Energy & Infrastructure · your coverage'},
 {type:'Client',name:'Cedar Pharma Group',sub:'Healthcare · SCR 2026 · your coverage'},
 {type:'Client',name:'Peer Holdings',sub:'Interconnection — competitor of Northwind Holdings'},
 {type:'Person',name:'Robert Johnson',sub:'Founder & Chairman · Northwind Holdings'},
 {type:'Person',name:'Linda Williams',sub:'CEO · Northwind Holdings'},
 {type:'Person',name:'Michael Brown',sub:'CFO · Northwind Holdings'},
 {type:'Person',name:'David Miller',sub:'Relationship Manager · Corporate Banking'},
 {type:'Deal',name:'Term Loan A refinancing',sub:'$1.2B · Active · Q3 2026',parent:'Northwind Holdings'},
 {type:'Deal',name:'Renewables tax-equity advisory',sub:'$320M · Proposal · Q4 2026',parent:'Northwind Holdings'},
 {type:'Deal',name:'FX hedging program expansion',sub:'$85M · Won · May 2026',parent:'Northwind Holdings'},
 {type:'Note',name:'Q2 board meeting — refinancing appetite',sub:'Bulletin · D. Miller · 2 days ago',parent:'Northwind Holdings'},
 {type:'Note',name:'Renewables advisory kickoff recap',sub:'Meeting report · S. Lee',parent:'Northwind Holdings'}
];
var ORDER=['Client','Person','Deal','Note'],LABEL={Client:'Clients',Person:'People',Deal:'Deals',Note:'Notes'};
var RECENT=['Northwind Holdings','Robert Johnson','Term Loan A refinancing'];
var scope='all',active=0,flat=[];

function esc(s){return s.replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function hi(text,q){ if(!q)return esc(text); var i=text.toLowerCase().indexOf(q.toLowerCase()); if(i<0)return esc(text); return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length)); }
function matches(it,q){ q=q.toLowerCase(); return it.name.toLowerCase().indexOf(q)>-1 || (it.parent&&it.parent.toLowerCase().indexOf(q)>-1) || it.sub.toLowerCase().indexOf(q)>-1; }

function render(){
  var q=document.getElementById('q').value.trim();
  var body=document.getElementById('body');
  active=0;flat=[];
  if(!q){
    var h='<div class="recent"><div class="grp-h"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Recent</div>';
    RECENT.forEach(function(n){var it=DATA.filter(function(d){return d.name===n;})[0];if(it){flat.push(it);h+=row(it,'',flat.length-1);}});
    h+='</div>';body.innerHTML=h;mark();return;
  }
  var res=DATA.filter(function(it){return matches(it,q);});
  if(scope!=='all')res=res.filter(function(it){return it.type===scope;});
  if(!res.length){
    body.innerHTML='<div class="noresults"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.34-4.34"/></svg></div><div class="t">No matches for <b>“'+esc(q)+'”</b></div><div class="d">Try a company, person, deal, or a portfolio/parent company name.</div></div>';
    return;
  }
  var html='';
  ORDER.forEach(function(t){
    var g=res.filter(function(it){return it.type===t;});
    if(!g.length)return;
    html+='<div class="grp-h">'+LABEL[t]+' <span class="c">· '+g.length+'</span></div>';
    g.forEach(function(it){flat.push(it);html+=row(it,q,flat.length-1);});
  });
  body.innerHTML=html;mark();
}
function row(it,q,idx){
  var pc=it.parent?'<span class="pc">in '+esc(it.parent.length>22?it.parent.slice(0,20)+'…':it.parent)+'</span>':'';
  var sub=it.parent?(DRILL+' '+hi(it.sub,q)) : hi(it.sub,q);
  return '<div class="res" data-i="'+idx+'"'+(it.href?' data-href="'+it.href+'"':'')+'>'+
    '<div class="ic '+(it.type==='Client'?'client':'')+'">'+ICON[it.type]+'</div>'+
    '<div class="tx"><div class="n">'+hi(it.name,q)+'</div><div class="s">'+sub+'</div></div>'+
    pc+'<div class="go">↵</div></div>';
}
function mark(){
  var rows=document.querySelectorAll('.res');
  rows.forEach(function(r,i){r.classList.toggle('active',i===active);});
  rows.forEach(function(r){
    r.onclick=function(){open(r);};
    r.onmouseenter=function(){active=+r.dataset.i; rows.forEach(function(x){x.classList.toggle('active',x===r);});};
  });
}
function open(r){ if(r.dataset.href){window.location.href=r.dataset.href;} else {toast('Opening '+r.querySelector('.n').textContent);} }

document.getElementById('q').addEventListener('input',render);
document.getElementById('scope').querySelectorAll('button').forEach(function(b){

 var sparkAv='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>';
 var panel=document.getElementById("cwPanel"),fab=document.getElementById("cwFab"),body=document.getElementById("cwBody"),input=document.getElementById("cwInput"),hist=document.getElementById("cwHist"),list=document.getElementById("cwList");
 var cwDeep=document.getElementById("cwDeep"),cwToolsBtn=document.getElementById("cwToolsBtn"),cwMenu=document.getElementById("cwMenu");
 var saved=[];
 function emptyState(){
  body.innerHTML='<div class="cw-empty"><div class="cw-eh">How can I help, Jane?</div><p>Ask anything across your coverage book — answers are grounded in CIBC’s internal systems and cited.</p><div class="cw-chips">'+P.map(function(p){return '<button class="cw-chip" data-q="'+p.q.replace(/"/g,"&quot;")+'">'+(ICO[p.i]||'')+'<span>'+p.q+'</span></button>';}).join('')+'</div></div>';
  [].slice.call(body.querySelectorAll('.cw-chip')).forEach(function(b){b.addEventListener('click',function(){ask(b.getAttribute('data-q'));});});
 }
 function hasConvo(){return !!body.querySelector('.cw-msg.u');}
 function scroll(){body.scrollTop=body.scrollHeight;}
 function addUser(t){var d=document.createElement('div');d.className='cw-msg u';d.innerHTML='<span class="cw-av">JS</span><div class="cw-bub">'+t+'</div>';body.appendChild(d);scroll();}
 function addAI(h){var d=document.createElement('div');d.className='cw-msg ai';d.innerHTML='<span class="cw-av">'+sparkAv+'</span><div class="cw-bub">'+h+'</div>';body.appendChild(d);scroll();}
 function typing(){var d=document.createElement('div');d.className='cw-msg ai';d.innerHTML='<span class="cw-av">'+sparkAv+'</span><div class="cw-bub"><div class="cw-type"><i></i><i></i><i></i></div></div>';body.appendChild(d);scroll();return d;}
  var WSRC='<div class="cw-srcs"><button class="cw-src wb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.7 2.6 2.7 15.4 0 18M12 3c-2.7 2.6-2.7 15.4 0 18"/></svg>Market news</button><button class="cw-src wb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.7 2.6 2.7 15.4 0 18M12 3c-2.7 2.6-2.7 15.4 0 18"/></svg>Public filings</button></div>';
 function webNote(){return '<div class="cw-wnote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.7 2.6 2.7 15.4 0 18M12 3c-2.7 2.6-2.7 15.4 0 18"/></svg>Searched the public web — results cited below</div>';}
 function ask(q){q=(q||'').trim();if(!q)return;var e=body.querySelector('.cw-empty');if(e)e.remove();var deep=cwDeep.classList.contains('on');addUser(q);if(deep){deepFlow(q);return;}var t=typing();setTimeout(function(){t.remove();addAI(ansFor(q)+WSRC);},1000);}
 function deepFlow(q){var steps=['Searching internal systems (CMCR, ECIF, call reports)…','Searching the public web…','Reading 11 sources…','Cross-checking figures…','Writing your brief…'];var d=document.createElement('div');d.className='cw-msg ai';d.innerHTML='<span class="cw-av">'+sparkAv+'</span><div class="cw-bub"><div class="cw-research"><div class="cw-rtitle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5z"/><path d="m2 17 10 5 10-5M2 12l10 5 10-5"/></svg>Deep research</div><div class="cw-rstep" id="cwRStep">'+steps[0]+'</div></div></div>';body.appendChild(d);scroll();var i=0,stepEl=d.querySelector('#cwRStep');var iv=setInterval(function(){i++;if(i<steps.length){stepEl.textContent=steps[i];scroll();}else{clearInterval(iv);d.remove();addAI(deepBrief(q));}},760);}
 function deepBrief(q){var topic=q.replace(/</g,'&lt;');return '<div class="cw-brief"><div class="cw-bh">Research brief</div><p><strong>Topic — </strong>'+topic+'</p><p><strong>What I found.</strong> Across 11 internal and public sources, recent filings and news point to active refinancing and M&A interest in this segment — consistent with the maturities already in your book.</p><p><strong>Why it matters to your book.</strong> Two coverage clients have facilities maturing before year-end; an early refinancing conversation positions CIBC ahead of competitors.</p><p><strong>Suggested next step.</strong> Open the refinancing dialogue with the relevant CFOs this quarter and flag the renewables tax-equity mandate.</p><div class="cw-srcs">'+src("CMCR","chart")+src("ECIF","ecif")+src("Call reports","file")+'</div>'+WSRC+'</div>';}
 function open(){panel.classList.add('cw-open');panel.setAttribute('aria-hidden','false');fab.classList.add('cw-hide');if(!body.innerHTML.trim())emptyState();}
 function close(){panel.classList.remove('cw-open');panel.setAttribute('aria-hidden','true');fab.classList.remove('cw-hide');hist.classList.remove('cw-open');}
 function newChat(){if(hasConvo()){var ut=body.querySelector('.cw-msg.u .cw-bub');saved.unshift({title:ut?ut.textContent:'Chat',ts:Date.now(),html:body.innerHTML});}emptyState();hist.classList.remove('cw-open');input.focus();}
 function rel(ts){var m=Math.round((Date.now()-ts)/60000);if(m<1)return 'just now';if(m<60)return m+'m ago';var h=Math.round(m/60);return h+'h ago';}
 function renderHist(){if(!saved.length){list.innerHTML='<div class="cw-hempty">No saved chats yet. Start a new conversation and it’ll appear here.</div>';return;}
  list.innerHTML=saved.map(function(s,i){return '<div class="cw-hitem" data-i="'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 10h8M8 14h5M21 12a9 9 0 1 1-3.3-7"/></svg><div style="min-width:0"><div class="htt">'+s.title+'</div><div class="htd">'+rel(s.ts)+'</div></div></div>';}).join('');
  [].slice.call(list.querySelectorAll('.cw-hitem')).forEach(function(it){it.addEventListener('click',function(){var s=saved[+it.getAttribute('data-i')];body.innerHTML=s.html;hist.classList.remove('cw-open');scroll();});});}
 window.cwOpen=open;
 fab.addEventListener('click',open);
 document.getElementById('cwClose').addEventListener('click',close);
 document.getElementById('cwNew').addEventListener('click',newChat);
 
 document.getElementById('cwHistBtn').addEventListener('click',function(){if(hist.classList.contains('cw-open')){hist.classList.remove('cw-open');}else{renderHist();hist.classList.add('cw-open');}});
 document.getElementById('cwSend').addEventListener('click',function(){var v=input.value;input.value='';input.style.height='auto';ask(v);});
 cwDeep.addEventListener('click',function(){cwDeep.classList.toggle('on');cwToolsBtn.classList.toggle('on',cwDeep.classList.contains('on'));cwMenu.classList.remove('open');input.focus();});
 cwToolsBtn.addEventListener('click',function(e){e.stopPropagation();cwMenu.classList.toggle('open');});
 document.addEventListener('click',function(e){if(cwMenu.classList.contains('open')&&!cwMenu.contains(e.target)&&!cwToolsBtn.contains(e.target))cwMenu.classList.remove('open');});
 input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();var v=input.value;input.value='';input.style.height='auto';ask(v);}});
 input.addEventListener('input',function(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,88)+'px';});
 emptyState();
})();
</script>
</body>
</html>
