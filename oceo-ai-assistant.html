<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />
<title>OCEO 2.0 — CAI Portfolio Assistant</title>
<style>
:root{
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--s7:48px;--s8:64px;
  --t-xs:11px;--t-sm:13px;--t-base:14px;--t-md:16px;--t-lg:20px;--t-xl:28px;--t-2xl:34px;
  --font-ui:"Inter Tight",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  --font-display:"Spectral",Georgia,"Times New Roman",serif;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-pill:999px;
  --canvas:#F5F6F4;--surface:#FFFFFF;--surface-2:#FAFBFA;--surface-3:#F0F2EF;
  --line:#E4E7E3;--line-2:#EDEFEB;--ink:#19211E;--ink-2:#566059;--ink-3:#8A938C;--charcoal:#24262B;
  --brand:#C41F3E;--brand-600:#A81733;--brand-700:#7E0F26;--brand-tint:#FBEEF0;--brand-tint-2:#F2D5DA;
  --success:#2E7D5B;--success-tint:#E3F1EA;--warning:#A86A12;--danger:#B23A2C;--info:#2B6CB0;--info-tint:#E2ECF7;
  --sh-xs:0 1px 2px rgba(16,24,20,.06);--sh-sm:0 2px 8px rgba(16,24,20,.07);--sh-md:0 10px 28px rgba(16,24,20,.12);--sh-lg:0 30px 80px rgba(16,24,20,.3);
  --ring:0 0 0 3px rgba(196,31,62,.2);--sidebar-w:248px;--topbar-h:60px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-ui);font-size:var(--t-base);color:var(--ink);background:var(--canvas);-webkit-font-smoothing:antialiased;line-height:1.5;}
svg{display:block;}button{font-family:inherit;cursor:pointer;}
*::-webkit-scrollbar{width:9px;}*::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;border:2px solid transparent;background-clip:content-box;}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}
.sidebar{background:var(--charcoal);color:#D7DADE;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.brand{display:flex;align-items:center;gap:var(--s3);padding:var(--s5) var(--s5) var(--s4);}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,var(--brand),var(--brand-700));display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;}
.brand-name{font-family:var(--font-display);font-size:var(--t-md);color:#fff;line-height:1.1;}
.brand-sub{font-size:var(--t-xs);color:#9A9FA6;letter-spacing:.08em;text-transform:uppercase;}
.nav{padding:var(--s3);display:flex;flex-direction:column;gap:2px;flex:1 1 auto;}
.nav-label{font-size:var(--t-xs);letter-spacing:.1em;text-transform:uppercase;color:#868B92;padding:var(--s4) var(--s3) var(--s2);}
.nav-item{display:flex;align-items:center;gap:var(--s3);padding:9px var(--s3);border-radius:var(--r-sm);color:#C7CACE;font-size:var(--t-base);font-weight:500;border:none;background:transparent;width:100%;text-align:left;}
.nav-item svg{width:18px;height:18px;opacity:.85;flex:0 0 auto;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:var(--brand-600);color:#fff;}
.side-foot{border-top:1px solid rgba(255,255,255,.08);padding:var(--s3);}
.vc-card{display:flex;align-items:center;gap:var(--s3);padding:var(--s2);}
.avatar{border-radius:50%;display:grid;place-items:center;font-weight:600;color:#fff;background:var(--brand-600);font-size:var(--t-sm);}
.vc-name{font-size:var(--t-sm);color:#fff;font-weight:600;}.vc-role{font-size:var(--t-xs);color:#9A9FA6;}
.main{display:flex;flex-direction:column;min-width:0;}
.topbar{height:var(--topbar-h);display:flex;align-items:center;gap:var(--s4);padding:0 var(--s6);background:color-mix(in srgb,var(--surface) 80%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;}
.crumbs{font-size:var(--t-sm);color:var(--ink-3);}.crumbs b{color:var(--ink);font-weight:600;}
.icon-btn{width:38px;height:38px;border-radius:var(--r-sm);border:1px solid transparent;background:transparent;color:var(--ink-2);display:grid;place-items:center;margin-left:auto;}
.icon-btn:hover{background:var(--surface-3);color:var(--ink);}.icon-btn svg{width:19px;height:19px;}
.icon-btn+.icon-btn{margin-left:0;}

.workspace{display:grid;grid-template-columns:1fr;gap:var(--s5);padding:var(--s6) var(--s7);max-width:1280px;width:100%;margin:0 auto;align-items:start;}
.workspace.full{grid-template-columns:1fr;max-width:1280px;}
.workspace.full .book{display:none;}

/* left: compact book */
.book h2{font-family:var(--font-display);font-size:var(--t-lg);font-weight:500;margin:0 0 4px;}
.book .sub{font-size:var(--t-sm);color:var(--ink-2);margin-bottom:var(--s4);}
.bookcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--sh-xs);overflow:hidden;}
.bk-h{display:flex;align-items:center;gap:var(--s3);padding:var(--s4);border-bottom:1px solid var(--line-2);}
.bk-h .eyebrow{font-size:var(--t-xs);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;}
.bkrow{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);border-bottom:1px solid var(--line-2);}
.bkrow:last-child{border-bottom:none;}
.bkrow .lg{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:#fff;font-family:var(--font-display);font-size:14px;background:linear-gradient(150deg,var(--brand),var(--brand-700));flex:0 0 auto;}
.bkrow .lg.a2{background:linear-gradient(150deg,#3A5A6B,#22323B);}.bkrow .lg.a3{background:linear-gradient(150deg,#5B5466,#332E3C);}.bkrow .lg.a4{background:linear-gradient(150deg,#4A6B57,#2C4034);}.bkrow .lg.a5{background:linear-gradient(150deg,#6B5A3A,#3C3322);}.bkrow .lg.a6{background:linear-gradient(150deg,#6B3A4A,#3C222C);}
.bkrow .nm{flex:1 1 auto;min-width:0;}
.bkrow .nm .n{font-size:var(--t-sm);font-weight:600;}
.bkrow .nm .r{font-size:var(--t-xs);color:var(--ink-3);}
.bkrow .v{font-weight:700;font-family:var(--font-display);font-variant-numeric:tabular-nums;font-size:var(--t-sm);}
.booktot{display:flex;justify-content:space-between;padding:var(--s4);background:var(--surface-2);font-size:var(--t-sm);}
.booktot b{font-family:var(--font-display);font-weight:600;}

/* right: CAI panel */
.cai{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-md);position:sticky;top:calc(var(--topbar-h) + 24px);height:calc(100vh - var(--topbar-h) - 56px);overflow:hidden;}
.workspace.full .cai{height:calc(100vh - var(--topbar-h) - 56px);}
.cai-h{display:flex;align-items:center;gap:var(--s3);padding:var(--s4) var(--s4) var(--s3);border-bottom:1px solid var(--line-2);}
.cai-h .mk{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,var(--brand),var(--brand-700));display:grid;place-items:center;color:#fff;flex:0 0 auto;}
.cai-h .mk svg{width:18px;height:18px;}
.cai-h .ti .t{font-family:var(--font-display);font-size:var(--t-md);font-weight:500;line-height:1.05;}
.cai-h .ti .s{font-size:var(--t-xs);color:var(--ink-3);}
.cai-h .acts{margin-left:auto;display:flex;gap:4px;}
.cai-h .acts button{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--surface);color:var(--ink-2);display:grid;place-items:center;}
.cai-h .acts button:hover{border-color:var(--brand);color:var(--brand);}
.cai-h .acts button svg{width:15px;height:15px;}
.trust{display:flex;gap:var(--s2);align-items:flex-start;padding:10px var(--s4);background:var(--success-tint);border-bottom:1px solid var(--line-2);}
.trust svg{width:15px;height:15px;color:var(--success);flex:0 0 auto;margin-top:1px;}
.trust .x{font-size:var(--t-xs);color:var(--ink-2);line-height:1.5;}
.trust .x b{color:var(--ink);}
.thread{flex:1 1 auto;overflow-y:auto;padding:var(--s4);display:flex;flex-direction:column;gap:var(--s4);}
.workspace.full .thread{padding:var(--s5) var(--s6);}
.msg{display:flex;gap:10px;max-width:100%;}
.msg.user{flex-direction:row-reverse;}
.msg .av{width:28px;height:28px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-size:11px;font-weight:700;}
.msg.ai .av{background:linear-gradient(145deg,var(--brand),var(--brand-700));color:#fff;}
.msg.ai .av svg{width:15px;height:15px;}
.msg.user .av{background:var(--charcoal);color:#fff;}
.bubble{border-radius:var(--r-md);padding:11px 14px;font-size:var(--t-sm);line-height:1.6;}
.msg.user .bubble{background:var(--brand);color:#fff;border-bottom-right-radius:4px;max-width:80%;}
.msg.ai .bubble{background:var(--surface-2);border:1px solid var(--line-2);color:var(--ink);border-bottom-left-radius:4px;flex:1 1 auto;min-width:0;}
.bubble p{margin:0 0 8px;}.bubble p:last-child{margin-bottom:0;}
.bubble strong{font-weight:700;}
.qtable{width:100%;border-collapse:collapse;margin:8px 0;font-size:var(--t-xs);background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.qtable th{text-align:left;font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);font-weight:700;padding:7px 10px;border-bottom:1px solid var(--line);background:var(--surface-2);}
.qtable td{padding:8px 10px;border-bottom:1px solid var(--line-2);}
.qtable tr:last-child td{border-bottom:none;}
.qtable .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
.bars{margin:6px 0;}
.bars .r{display:flex;align-items:center;gap:10px;padding:3px 0;font-size:var(--t-xs);}
.bars .r .l{width:120px;flex:0 0 auto;color:var(--ink-2);}
.bars .r .t{flex:1 1 auto;height:8px;border-radius:99px;background:var(--surface-3);overflow:hidden;}
.bars .r .f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--brand-600),var(--brand));}
.bars .r .v{width:66px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;}
.srcs{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.src{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--brand-700);background:var(--brand-tint);border:none;border-radius:var(--r-pill);padding:2px 8px;}
.src svg{width:10px;height:10px;}
.typing{display:flex;gap:4px;padding:4px 0;}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--ink-3);animation:bob 1s infinite;}
.typing i:nth-child(2){animation-delay:.15s;}.typing i:nth-child(3){animation-delay:.3s;}
@keyframes bob{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

.suggest{padding:0 var(--s4) var(--s3);}
.suggest .lab{display:flex;align-items:center;gap:6px;width:100%;font-family:inherit;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:8px;background:none;border:none;padding:0;cursor:pointer;}
.suggest .lab .chev{width:13px;height:13px;margin-left:auto;transition:transform .18s;}
.suggest .lab:hover{color:var(--ink-2);}
.suggest.collapsed .lab{margin-bottom:0;}
.suggest.collapsed .lab .chev{transform:rotate(-90deg);}
.suggest.collapsed .chips{display:none;}
.suggest .chips{display:flex;flex-direction:column;gap:6px;}
.workspace.full .suggest .chips{flex-direction:row;flex-wrap:wrap;}
.schip{text-align:left;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:var(--r-sm);padding:9px 12px;font-size:var(--t-sm);font-weight:500;transition:all .15s;display:flex;align-items:center;gap:8px;}
.schip:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-tint);}
.schip svg{width:14px;height:14px;color:var(--brand);flex:0 0 auto;}
.composer{border-top:1px solid var(--line-2);padding:var(--s3) var(--s4);background:var(--surface);}
.composer{position:relative;}
.tools-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;transition:background .14s,color .14s,border-color .14s;}
.tools-btn svg{width:17px;height:17px;}
.tools-btn:hover{border-color:var(--brand-tint-2);color:var(--ink);}
.tools-btn.on{background:var(--brand);border-color:var(--brand);color:#fff;}
.cmenu{position:absolute;left:var(--s4);bottom:64px;width:320px;max-width:calc(100% - 32px);background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-md);padding:6px;opacity:0;visibility:hidden;transform:translateY(6px);transition:opacity .14s,transform .14s,visibility .14s;z-index:30;}
.cmenu.open{opacity:1;visibility:visible;transform:translateY(0);}
.cmenu-h{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;padding:6px 8px 4px;}
.mitem{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;background:none;border:none;border-radius:8px;padding:9px 8px;cursor:pointer;}
.mitem:hover{background:var(--surface-3);}
.mic{width:30px;height:30px;border-radius:7px;background:var(--surface-3);color:var(--ink-2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.mic svg{width:16px;height:16px;}
.mtx{flex:1 1 auto;min-width:0;}
.mtx .t{display:block;font-size:13px;font-weight:600;color:var(--ink);}
.mtx .d{display:block;font-size:11px;color:var(--ink-3);line-height:1.4;margin-top:2px;}
.mck{flex:0 0 auto;color:var(--brand);opacity:0;align-self:center;}
.mck svg{width:16px;height:16px;}
.mitem.on .mic{background:var(--brand);color:#fff;}
.mitem.on .mck{opacity:1;}
.wnote{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#2B5C8A;background:#E8EEF6;border-radius:8px;padding:6px 10px;margin-bottom:8px;}
.wnote svg{width:13px;height:13px;flex:0 0 auto;}
.src.wb{color:#2B5C8A;background:#E8EEF6;}
.research{display:flex;flex-direction:column;gap:8px;}
.rtitle{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13px;color:var(--ink);}
.rtitle svg{width:15px;height:15px;color:var(--brand);}
.rstep{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-2);}
.rstep::before{content:"";width:12px;height:12px;border:2px solid var(--brand-tint-2);border-top-color:var(--brand);border-radius:50%;display:inline-block;animation:cwspin .7s linear infinite;flex:0 0 auto;}
@keyframes cwspin{to{transform:rotate(360deg);}}
.brief .bh{font-family:var(--font-display);font-weight:500;font-size:15px;margin-bottom:6px;}
.brief p{margin:0 0 9px;}
.composer .box{display:flex;align-items:flex-end;gap:8px;border:1px solid var(--line);border-radius:var(--r-md);padding:6px 6px 6px 12px;background:var(--surface-2);}
.composer .box:focus-within{border-color:var(--brand);box-shadow:var(--ring);background:var(--surface);}
.composer textarea{flex:1 1 auto;border:none;background:transparent;resize:none;font-family:inherit;font-size:var(--t-sm);color:var(--ink);max-height:96px;line-height:1.5;padding:6px 0;}
.composer textarea:focus{outline:none;}
.composer .send{width:34px;height:34px;border-radius:8px;background:var(--brand);color:#fff;border:none;display:grid;place-items:center;flex:0 0 auto;}
.composer .send:hover{background:var(--brand-600);}.composer .send svg{width:17px;height:17px;}
.composer .foot{font-size:10px;color:var(--ink-3);margin-top:7px;text-align:center;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">O</div><div><div class="brand-name">OCEO&nbsp;2.0</div><div class="brand-sub">Office of the CEO</div></div></div>
    <nav class="nav">
      <div class="nav-label">Workspace</div>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>My Portfolio</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Clients</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>Notes &amp; Tasks</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 17l5-5 4 4 8-9"/><path d="M21 7v5h-5"/></svg>Pipeline</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>Dashboard</button>
      <div class="nav-label">Tools</div>
      <button class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>Ask CAI</button>
      <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>Global Search</button>
    </nav>
    <div class="side-foot"><div class="vc-card"><div class="avatar" style="width:36px;height:36px;">JS</div><div><div class="vc-name">Jane Smith</div><div class="vc-role">Vice Chair · Coverage</div></div></div></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="crumbs"><b>Ask CAI</b> — Portfolio Assistant</div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg></button>
      <button class="icon-btn" title="Notifications" aria-label="Notifications" style="margin-left:0;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg></button>
    </header>

    <div class="workspace" id="workspace">
      <!-- CAI -->
      <div class="cai">
        <div class="cai-h">
          <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg></div>
          <div class="ti"><div class="t">CAI</div><div class="s">Portfolio mode</div></div>
          <div class="acts">
            
            <button id="newBtn" title="New conversation" aria-label="New conversation"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
          </div>
        </div>
        <div class="thread" id="thread"></div>
        <div class="suggest" id="suggest">
          <button class="lab" id="suggestToggle" type="button">Try asking<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
          <div class="chips" id="chips"></div>
        </div>
        <div class="composer">
          <div class="box">
            <button class="tools-btn" id="toolsBtn" type="button" aria-label="Search tools"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg></button>
            <textarea id="input" rows="1" placeholder="Ask CAI anything…"></textarea>
            <button class="send" id="send" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M6 11l6-6 6 6"/></svg></button>
          </div>
          <div class="cmenu" id="cmenu" role="menu"><div class="cmenu-h">Search tools</div><button class="mitem" id="deepBtn" type="button" role="menuitemcheckbox"><span class="mic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5z"/><path d="m2 17 10 5 10-5M2 12l10 5 10-5"/></svg></span><span class="mtx"><span class="t">Deep research</span><span class="d">Searches many internal &amp; public sources, then writes a cited brief — takes a moment.</span></span><span class="mck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span></button></div>
          <div class="foot">CAI can make mistakes — figures are cited; verify before acting. Web results are cited too.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var ICO={
 file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/></svg>',
 chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V5M4 19h16M8 16V9M12 16v-4M16 16V7"/></svg>',
 ceas:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>',
 ecif:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.3 3-5 7-5s7 1.7 7 5"/></svg>',
 cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>'
};
function src(name,icon){return '<button class="src">'+(ICO[icon]||'')+name+'</button>';}

var PROMPTS=[
 {q:"Which clients have debt maturities in the next 6 months?",icon:'cal',a:
   '<p>Three of your coverage clients have facilities maturing before year-end:</p>'+
   '<table class="qtable"><thead><tr><th>Client</th><th>Facility</th><th class="num">Amount</th><th>Maturity</th></tr></thead><tbody>'+
   '<tr><td>Northwind Holdings</td><td>Term Loan A</td><td class="num">$1.0B</td><td>Q3 2026</td></tr>'+
   '<tr><td>Midland Energy</td><td>Revolving Credit</td><td class="num">$450M</td><td>Aug 2026</td></tr>'+
   '<tr><td>Quadrant Holdings</td><td>Term Loan</td><td class="num">$180M</td><td>Sep 2026</td></tr>'+
   '</tbody></table>'+
   '<p>Northwind Holdings’s CFO has already signalled refinancing appetite. Want me to draft outreach for the other two?</p>'+
   '<div class="srcs">'+src('CMCR','chart')+src('CEAS','ceas')+src('Call reports','file')+'</div>'},
 {q:"Summarize my book's revenue by line of business",icon:'chart',a:
   '<p>Your $157.1M FY25 book breaks down as:</p>'+
   '<div class="bars">'+
   '<div class="r"><span class="l">Capital Markets</span><span class="t"><span class="f" style="width:100%"></span></span><span class="v">$76.4M</span></div>'+
   '<div class="r"><span class="l">Lending</span><span class="t"><span class="f" style="width:64%"></span></span><span class="v">$48.6M</span></div>'+
   '<div class="r"><span class="l">Commercial</span><span class="t"><span class="f" style="width:24%"></span></span><span class="v">$18.0M</span></div>'+
   '<div class="r"><span class="l">Private Wealth</span><span class="t"><span class="f" style="width:19%"></span></span><span class="v">$14.4M</span></div>'+
   '</div>'+
   '<p>Capital Markets is 49% of revenue, concentrated in Northwind Holdings and Midland Energy. Blended RORC is 16.4%.</p>'+
   '<div class="srcs">'+src('CMCR','chart')+'</div>'},
 {q:"Who haven't I met with in over 90 days?",icon:'ecif',a:
   '<p>Two clients are past your 90-day relationship cadence:</p>'+
   '<table class="qtable"><thead><tr><th>Client</th><th>Last contact</th><th class="num">Days</th></tr></thead><tbody>'+
   '<tr><td>Quadrant Holdings</td><td>Feb 24, 2026</td><td class="num">104</td></tr>'+
   '<tr><td>The Johnson Family Office</td><td>Mar 13, 2026</td><td class="num">87</td></tr>'+
   '</tbody></table>'+
   '<p>Quadrant also has a Q3 maturity — a good reason to reconnect. Shall I find a time next week?</p>'+
   '<div class="srcs">'+src('ECIF','ecif')+src('Outlook','cal')+src('SF interactions','file')+'</div>'},
 {q:"Draft talking points for my Midland Energy meeting",icon:'file',a:
   '<p>For your Jun 12 quarterly review with <strong>Midland Energy</strong>:</p>'+
   '<p>• Their $450M revolver matures in August — open the refinancing conversation early.<br>'+
   '• Renewables capex is rising; position CIBC for the tax-equity mandate.<br>'+
   '• FX hedging proposal is still open with treasury — chase a decision.<br>'+
   '• Acknowledge the strong FY25 ($34.6M, +12% YoY) and reinforce the partnership.</p>'+
   '<div class="srcs">'+src('Call reports','file')+src('Darwin','chart')+src('CMCR','chart')+'</div>'}
];
var FALLBACK='<p>I can answer that across your coverage book using CIBC’s internal systems — every figure cited, nothing leaving the bank. For this prototype, try one of the suggested questions to see a grounded response with sources.</p><div class="srcs">'+src('CMCR','chart')+src('ECIF','ecif')+'</div>';

var thread=document.getElementById('thread'), chipsEl=document.getElementById('chips'), suggestEl=document.getElementById('suggest');
function avAI(){return '<div class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg></div>';}
function addUser(t){var d=document.createElement('div');d.className='msg user';d.innerHTML='<div class="av">JS</div><div class="bubble">'+t+'</div>';thread.appendChild(d);scroll();}
function addAI(html){var d=document.createElement('div');d.className='msg ai';d.innerHTML=avAI()+'<div class="bubble">'+html+'</div>';thread.appendChild(d);scroll();return d;}
function typing(){var d=document.createElement('div');d.className='msg ai';d.innerHTML=avAI()+'<div class="bubble"><div class="typing"><i></i><i></i><i></i></div></div>';thread.appendChild(d);scroll();return d;}
function scroll(){thread.scrollTop=thread.scrollHeight;}
function answerFor(q){var lq=q.toLowerCase();for(var i=0;i<PROMPTS.length;i++){if(PROMPTS[i].q.toLowerCase()===lq)return PROMPTS[i].a;}
  if(lq.indexOf('matur')>-1)return PROMPTS[0].a; if(lq.indexOf('revenue')>-1||lq.indexOf('lob')>-1||lq.indexOf('line of business')>-1||lq.indexOf('book')>-1)return PROMPTS[1].a;
  if(lq.indexOf('met')>-1||lq.indexOf('90')>-1||lq.indexOf('contact')>-1)return PROMPTS[2].a; if(lq.indexOf('talking')>-1||lq.indexOf('meridian')>-1||lq.indexOf('prep')>-1)return PROMPTS[3].a;
  return FALLBACK;}
var GLOBE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.7 2.6 2.7 15.4 0 18M12 3c-2.7 2.6-2.7 15.4 0 18"/></svg>';
var LAYERS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5z"/><path d="m2 17 10 5 10-5M2 12l10 5 10-5"/></svg>';
var WSRC='<div class="srcs"><button class="src wb">'+GLOBE+'Market news</button><button class="src wb">'+GLOBE+'Public filings</button></div>';
function webNote(){return '<div class="wnote">'+GLOBE+'Searched the public web — results cited below</div>';}
function deepOn(){return document.getElementById('deepBtn').classList.contains('on');}
function ask(q){
  if(!q)return;
  suggestEl.classList.add('collapsed');
  addUser(q);
  if(deepOn()){deepFlow(q);return;}
  var t=typing();
  setTimeout(function(){t.remove();addAI(answerFor(q)+WSRC);},1000);
}
function deepFlow(q){
  var steps=['Searching internal systems (CMCR, ECIF, call reports)…','Searching the public web…','Reading 11 sources…','Cross-checking figures…','Writing your brief…'];
  var d=document.createElement('div');d.className='msg ai';
  d.innerHTML=avAI()+'<div class="bubble"><div class="research"><div class="rtitle">'+LAYERS+'Deep research</div><div class="rstep" id="rStep">'+steps[0]+'</div></div></div>';
  thread.appendChild(d);scroll();
  var i=0,stepEl=d.querySelector('#rStep');
  var iv=setInterval(function(){i++;if(i<steps.length){stepEl.textContent=steps[i];scroll();}else{clearInterval(iv);d.remove();addAI(deepBrief(q));}},760);
}
function deepBrief(q){var topic=q.replace(/</g,'&lt;');
  return '<div class="brief"><div class="bh">Research brief</div>'+
    '<p><strong>Topic — </strong>'+topic+'</p>'+
    '<p><strong>What I found.</strong> Across 11 internal and public sources, recent filings and news point to active refinancing and M&A interest in this segment — consistent with the maturities already in your book.</p>'+
    '<p><strong>Why it matters to your book.</strong> Two coverage clients have facilities maturing before year-end; an early refinancing conversation positions CIBC ahead of competitors.</p>'+
    '<p><strong>Suggested next step.</strong> Open the refinancing dialogue with the relevant CFOs this quarter and flag the renewables tax-equity mandate.</p>'+
    '<div class="srcs">'+src('CMCR','chart')+src('ECIF','ecif')+src('Call reports','file')+'</div>'+WSRC+'</div>';
}
function renderChips(){chipsEl.innerHTML=PROMPTS.map(function(p){return '<button class="schip">'+(ICO[p.icon]||'')+'<span>'+p.q+'</span></button>';}).join('');
  [].slice.call(chipsEl.querySelectorAll('.schip')).forEach(function(b,i){b.addEventListener('click',function(){ask(PROMPTS[i].q);});});}

/* seed one rich exchange so value is visible immediately */
function seed(){
  addAI('<p>Good morning, Jane. I’m <strong>CAI</strong> — I can answer questions across your coverage book using CIBC’s internal systems, securely. Ask me anything, or try a suggestion below.</p>');
  addUser(PROMPTS[0].q);
  addAI(PROMPTS[0].a);
}
renderChips(); seed();

var input=document.getElementById('input');
function submit(){var v=input.value.trim();if(!v)return;input.value='';input.style.height='auto';ask(v);}
document.getElementById('send').addEventListener('click',submit);
input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}});
input.addEventListener('input',function(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,96)+'px';});

var deepBtn=document.getElementById('deepBtn'),toolsBtn=document.getElementById('toolsBtn'),cmenu=document.getElementById('cmenu');
deepBtn.addEventListener('click',function(){deepBtn.classList.toggle('on');toolsBtn.classList.toggle('on',deepBtn.classList.contains('on'));cmenu.classList.remove('open');input.focus();});
toolsBtn.addEventListener('click',function(e){e.stopPropagation();cmenu.classList.toggle('open');});
document.addEventListener('click',function(e){if(cmenu.classList.contains('open')&&!cmenu.contains(e.target)&&!toolsBtn.contains(e.target))cmenu.classList.remove('open');});


document.getElementById('newBtn').addEventListener('click',function(){thread.innerHTML='';suggestEl.classList.remove('collapsed');renderChips();seed();});
document.getElementById('suggestToggle').addEventListener('click',function(){suggestEl.classList.toggle('collapsed');});
input.addEventListener('focus',function(){suggestEl.classList.add('collapsed');});

var themeBtn=document.getElementById('themeBtn');
themeBtn.addEventListener('click',function(){var n=document.body.getAttribute('data-theme')==='dark'?'light':'dark';document.body.setAttribute('data-theme',n);});
</script>
<script>(function(){var M={"My Portfolio":"oceo-portfolio-landing.html","Clients":"oceo-c360-prototype.html","Notes & Tasks":"oceo-tasks.html","Pipeline":"#","Dashboard":"oceo-exec-dashboard.html","Global Search":"oceo-global-search.html"};document.querySelectorAll(".nav-item").forEach(function(b){var t=(b.textContent||"").trim();Object.keys(M).forEach(function(k){if(t.indexOf(k)===0&&!b.dataset._w){b.dataset._w=1;b.style.cursor="pointer";b.addEventListener("click",function(){if(M[k]!=="#")location.href=M[k];});}});});var br=document.querySelector(".brand");if(br){br.style.cursor="pointer";br.addEventListener("click",function(){location.href="index.html";});}})();</script>
</body>
</html>
